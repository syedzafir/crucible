[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Route all /api/* requests to Netlify Functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — all unmatched routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
