[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Route /api/* to serverless functions
[[redirects]]
  from   = "/api/messages"
  to     = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from   = "/api/deepgram-token"
  to     = "/.netlify/functions/deepgram-token"
  status = 200

[[redirects]]
  from   = "/api/deepgram"
  to     = "/.netlify/functions/deepgram"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
