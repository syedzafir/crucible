[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Route /api/messages → Anthropic proxy function
[[redirects]]
  from   = "/api/messages"
  to     = "/.netlify/functions/api"
  status = 200

# Route /api/deepgram → Deepgram proxy function  
[[redirects]]
  from   = "/api/deepgram"
  to     = "/.netlify/functions/deepgram"
  status = 200

# SPA fallback — all unmatched routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
